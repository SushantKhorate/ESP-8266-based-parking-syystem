<!DOCTYPE html>
<html>
<head>
<title>Mahalakshmi Temple Parking</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

h1 {
    font-size: 32px;
}

/* MAIN CONTAINER */
.container {
    width: 800px;
    margin: auto;
    background: #c8e6c9;
    border: 4px solid #333;
    padding: 20px;
}

/* TOP */
.top {
    display: flex;
    justify-content: flex-start;
    gap: 60px;
    align-items: flex-end;
}

/* BUS GROUP */
.bus-group {
    display: flex;
    justify-content: space-around;
    width: 260px;
}

/* TEMPLE */
.temple {
    font-size: 28px;
    width: 260px;
    height: 300px;
    border: 3px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    background: white;
}

/* ROAD */
.road {
    height: 70px;
    background: #444;
    margin: 50px 0;
}

/* LOWER ROW */
.row {
    display: flex;
    justify-content: space-around;
}

/* PARKING SLOT */
.spot {
    width: 80px;
    height: 140px;
    border: 2px solid black;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    background: #4CAF50;
    color: white;
    padding: 8px 0;
    font-weight: bold;
}

/* OCCUPIED */
.occupied {
    background: #f44336;
}

/* TEXT */
.slot-id { font-size: 16px; }
.vehicle { font-size: 34px; }
.type { font-size: 13px; }

/* TABLE */
.parking-table {
    border-collapse: collapse;
    margin: 30px auto;
    font-size: 18px;
    background: white;
}

.parking-table th,
.parking-table td {
    border: 2px solid #333;
    padding: 10px 20px;
    text-align: center;
}

.parking-table th {
    background: #4CAF50;
    color: white;
}

/* CONTACT */
.contact {
    margin-top: 20px;
    font-size: 16px;
}
</style>

<script>
function update(){

fetch('/data')
.then(r=>r.json())
.then(d=>{

let car=0, mini=0, bus=0;

const slots = ["P1","P2","P3","P4","P5","P6","P7","P8"];

slots.forEach(k=>{
 let el = document.getElementById(k);
 let v = (k in d) ? d[k] : 1;

 el.classList.toggle("occupied", v == 0);

 if(["P1","P2","P3"].includes(k)){
   if(v) car++;
 }
 else if(["P4","P5","P6"].includes(k)){
   if(v) mini++;
 }
 else{
   if(v) bus++;
 }
});

// OCCUPIED
let car_occ = 3 - car;
let mini_occ = 3 - mini;
let bus_occ = 2 - bus;

// VACANT
let car_vac = car;
let mini_vac = mini;
let bus_vac = bus;

// UPDATE TABLE
document.getElementById("car_occ").innerText = car_occ;
document.getElementById("car_vac").innerText = car_vac;

document.getElementById("mini_occ").innerText = mini_occ;
document.getElementById("mini_vac").innerText = mini_vac;

document.getElementById("bus_occ").innerText = bus_occ;
document.getElementById("bus_vac").innerText = bus_vac;

})
.catch(err => console.log(err));
}

setInterval(update,1000);
window.onload = update;
</script>

</head>

<body>

<h1>Mahalakshmi Temple Parking</h1>

<div class="container">

  <!-- TOP -->
  <div class="top">

    <!-- BUS -->
    <div class="bus-group">
      <div id="P8" class="spot">
        <div class="slot-id">P8</div>
        <div class="vehicle">🚌</div>
        <div class="type">BUS</div>
      </div>

      <div id="P7" class="spot">
        <div class="slot-id">P7</div>
        <div class="vehicle">🚌</div>
        <div class="type">BUS</div>
      </div>
    </div>

    <!-- TEMPLE -->
    <div class="temple">TEMPLE</div>

  </div>

  <!-- ROAD -->
  <div class="road"></div>

  <!-- LOWER -->
  <div class="row">

    <div id="P6" class="spot">
      <div class="slot-id">P6</div>
      <div class="vehicle">🚐</div>
      <div class="type">MINI BUS</div>
    </div>

    <div id="P5" class="spot">
      <div class="slot-id">P5</div>
      <div class="vehicle">🚐</div>
      <div class="type">MINI BUS</div>
    </div>

    <div id="P4" class="spot">
      <div class="slot-id">P4</div>
      <div class="vehicle">🚐</div>
      <div class="type">MINI BUS</div>
    </div>

    <div id="P3" class="spot">
      <div class="slot-id">P3</div>
      <div class="vehicle">🚗</div>
      <div class="type">CAR</div>
    </div>

    <div id="P2" class="spot">
      <div class="slot-id">P2</div>
      <div class="vehicle">🚗</div>
      <div class="type">CAR</div>
    </div>

    <div id="P1" class="spot">
      <div class="slot-id">P1</div>
      <div class="vehicle">🚗</div>
      <div class="type">CAR</div>
    </div>

  </div>

</div>

<!-- TABLE -->
<table class="parking-table">
  <tr>
    <th>Type of Vehicle</th>
    <th>Occupied</th>
    <th>Vacant</th>
  </tr>
  <tr>
    <td>Car</td>
    <td id="car_occ"></td>
    <td id="car_vac"></td>
  </tr>
  <tr>
    <td>Mini Bus</td>
    <td id="mini_occ"></td>
    <td id="mini_vac"></td>
  </tr>
  <tr>
    <td>Bus</td>
    <td id="bus_occ"></td>
    <td id="bus_vac"></td>
  </tr>
</table>

<!-- CONTACT -->
<div class="contact">
Contact: 98XXXXXXXX<br>
Email: abc@gmail.com
</div>

</body>
</html>
