<!DOCTYPE html>
<html>
<head>
  <title>Mahalakshmi Temple Parking</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin: 10px;
    }

    .layout {
      width: 400px;
      height: 400px;
      margin: auto;
      position: relative;
      border: 2px solid black;
      background: white;
    }

    .temple {
      position: absolute;
      top: 140px;
      left: 140px;
      width: 120px;
      height: 120px;
      background: #ddd;
      line-height: 120px;
      font-weight: bold;
    }

    .slot {
      width: 50px;
      height: 30px;
      margin: 2px;
      display: inline-block;
      color: white;
      font-size: 10px;
      line-height: 30px;
    }

    .row {
      position: absolute;
    }

    .top { top: 10px; left: 80px; }
    .bottom { bottom: 10px; left: 80px; }
    .left { top: 80px; left: 10px; }

  </style>

  <script>
    function update(){
      fetch('/data')
      .then(r => r.json())
      .then(d => {

        for (let key in d) {
          let el = document.getElementById(key);

          if (d[key] == 1) {
            el.style.background = "green";
            el.innerHTML = key + "<br>Empty";
          } else {
            el.style.background = "red";
            el.innerHTML = key + "<br>Occupied";
          }
        }

      });
    }

    setInterval(update, 1000);
  </script>
</head>

<body onload="update()">

<h1>MAHALAKSHMI TEMPLE PARKING</h1>

<div class="layout">

  <div class="temple">TEMPLE</div>

  <!-- TOP -->
  <div class="row top">
    <div id="P9" class="slot">P9</div>
    <div id="P10" class="slot">P10</div>
    <div id="P11" class="slot">P11</div>
    <div id="P12" class="slot">P12</div>
  </div>

  <!-- LEFT -->
  <div class="row left">
    <div id="P5" class="slot">P5</div>
    <div id="P6" class="slot">P6</div>
    <div id="P7" class="slot">P7</div>
    <div id="P8" class="slot">P8</div>
  </div>

  <!-- BOTTOM -->
  <div class="row bottom">
    <div id="P4" class="slot">P4</div>
    <div id="P3" class="slot">P3</div>
    <div id="P2" class="slot">P2</div>
    <div id="P1" class="slot">P1</div>
  </div>

</div>

</body>
</html>
