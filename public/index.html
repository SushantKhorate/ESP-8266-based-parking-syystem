<!DOCTYPE html>
<html>
<head>
<title>Mahalakshmi Temple Parking</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

.container {
    width: 800px;
    margin: auto;
    background: #c8e6c9;
    border: 4px solid #333;
    padding: 20px;
}

/* TOP */
.top {
    display: flex;
    justify-content: flex-start;
    gap: 60px;
    align-items: flex-end;
}

.bus-group {
    display: flex;
    justify-content: space-around;
    width: 260px; /* controls spacing width */
}

/* TEMPLE */
.temple {
    font-size: 30px;
    width: 260px;
    height: 300px;
    border: 3px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    background: white;
}


/* ROAD */
.road {
    height: 70px;
    background: #444;
    margin: 50px 0;
}

/* LOWER */
.row {
    display: flex;
    justify-content: space-around;
}

.contact {
    margin-top: 30px;
    font-size: 18px;
    
}
/* SLOT */
.spot {
    width: 80px;
    height: 140px;
    border: 2px solid black;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    background: #4CAF50;
    color: white;
    padding: 8px 0;
    font-weight: bold;
    transition: 0.2s;
}

/* OCCUPIED */
.occupied {
    background: #f44336;
}

/* TEXT */
.slot-id { font-size: 16px; }
.vehicle { font-size: 36px; }
.type { font-size: 14px; }

/* SUMMARY */
.summary {
    margin-top: 30px;
    font-size: 20px;
    font-weight: bold;

    display: flex;
    flex-direction: column;
    align-items: center;     /* center block */
}

/* align text like a list */
.summary div {
    width: 200px;
    text-align: left;        /* THIS makes straight line */
}
</style>

<script>
function update(){

fetch('/data')
.then(r => r.json())
.then(d => {

let car=0, mini=0, bus=0;

const slots = ["P1","P2","P3","P4","P5","P6","P7","P8"];

slots.forEach(k=>{
 let el = document.getElementById(k);

 // FORCE VALUE (default = 1)
 let v = (k in d) ? d[k] : 1;

 el.classList.toggle("occupied", v == 0);

 if(["P1","P2","P3"].includes(k)){
   if(v) car++;
 }
 else if(["P4","P5","P6"].includes(k)){
   if(v) mini++;
 }
 else{
   if(v) bus++;
 }
});

// ALWAYS UPDATE TEXT (even if 0)
document.getElementById("car").innerText = "Car: " + car + " / 3";
document.getElementById("mini").innerText = "Mini Bus: " + mini + " / 3";
document.getElementById("bus").innerText = "Bus: " + bus + " / 2";

})
.catch(err => {
 console.log("DATA ERROR:", err);

 // fallback display
 document.getElementById("car").innerText = "Car: 0 / 3";
 document.getElementById("mini").innerText = "Mini Bus: 0 / 3";
 document.getElementById("bus").innerText = "Bus: 0 / 2";
});
}

setInterval(update,1000);
window.onload = update;
</script>

</head>

<body>

<h1>Mahalakshmi Temple Parking</h1>

<div class="container">

  <!-- TOP -->
  <div class="top">

    <!-- BUS -->
    <div class="bus-group">
      <div id="P8" class="spot">
        <div class="slot-id">P8</div>
        <div class="vehicle">🚌</div>
        <div class="type">BUS</div>
      </div>

      <div id="P7" class="spot">
        <div class="slot-id">P7</div>
        <div class="vehicle">🚌</div>
        <div class="type">BUS</div>
      </div>
    </div>

    <!-- TEMPLE -->
    <div class="temple">TEMPLE</div>

  </div>

  <!-- ROAD -->
  <div class="road"></div>

  <!-- LOWER -->
  <div class="row">

    <div id="P6" class="spot">
      <div class="slot-id">P6</div>
      <div class="vehicle">🚐</div>
      <div class="type">MINI BUS</div>
    </div>

    <div id="P5" class="spot">
      <div class="slot-id">P5</div>
      <div class="vehicle">🚐</div>
      <div class="type">MINI BUS</div>
    </div>

    <div id="P4" class="spot">
      <div class="slot-id">P4</div>
      <div class="vehicle">🚐</div>
      <div class="type">MINI BUS</div>
    </div>

    <div id="P3" class="spot">
      <div class="slot-id">P3</div>
      <div class="vehicle">🚗</div>
      <div class="type">CAR</div>
    </div>

    <div id="P2" class="spot">
      <div class="slot-id">P2</div>
      <div class="vehicle">🚗</div>
      <div class="type">CAR</div>
    </div>

    <div id="P1" class="spot">
      <div class="slot-id">P1</div>
      <div class="vehicle">🚗</div>
      <div class="type">CAR</div>
    </div>

  </div>

</div>

<!-- SUMMARY -->
<div class="summary">
  <div id="car"></div>
  <div id="mini"></div>
  <div id="bus"></div>
</div>

<!-- CONTACT -->
<div class="contact">
  Contact: 98XXXXXXXX<br>
Email: abc@gmail.com
</div>

</body>
</html>
